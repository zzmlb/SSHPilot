<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH 文件管理器 - 登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0f1117; --bg-sidebar: #161822; --bg-card: #1c1f2e; --bg-hover: #252839;
            --bg-input: #1e2133; --border: #2a2d3e; --text: #e0e0e8; --text-dim: #8888a0;
            --accent: #5b8af5; --accent-hover: #4a76e0; --danger: #e74c5e; --success: #4caf7a;
            --warning: #f5a623; --radius: 8px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-bg {
            position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
        }
        .login-bg .grid {
            position: absolute; inset: -40px;
            background-image:
                linear-gradient(rgba(91,138,245,.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(91,138,245,.06) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridShift 20s linear infinite;
        }
        @keyframes gridShift { to { transform: translate(60px, 60px); } }
        .login-bg .glow {
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .12;
        }
        .login-bg .glow-1 { top: -100px; left: -100px; background: var(--accent); }
        .login-bg .glow-2 { bottom: -150px; right: -100px; background: var(--success); opacity: .08; }

        .login-wrapper {
            position: relative; z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            width: 400px;
            max-width: 90vw;
        }

        .login-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .login-logo {
            width: 64px; height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #7c5bf5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            box-shadow: 0 8px 32px rgba(91,138,245,.3);
        }
        .login-brand h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .login-brand p {
            font-size: 13px;
            color: var(--text-dim);
        }

        .login-card {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 40px rgba(0,0,0,.3), 0 0 0 1px rgba(91,138,245,.05);
            backdrop-filter: blur(12px);
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .form-group label i {
            font-size: 11px;
            opacity: .7;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91,138,245,.12);
        }
        .input-wrapper input::placeholder {
            color: rgba(136,136,160,.5);
        }
        .input-wrapper .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
            transition: color .2s;
        }
        .input-wrapper input:focus + .input-icon,
        .input-wrapper input:focus ~ .input-icon {
            color: var(--accent);
        }
        .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 14px;
            cursor: pointer;
            padding: 2px;
            transition: color .15s;
        }
        .toggle-pwd:hover { color: var(--text); }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent), #4a76e0);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity .15s, transform .1s;
            margin-top: 6px;
        }
        .login-btn:hover { opacity: .9; }
        .login-btn:active { transform: scale(.98); }
        .login-btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }
        .login-btn .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }
        .login-btn.loading .spinner { display: block; }
        .login-btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-error {
            margin-top: 14px;
            padding: 0 4px;
            font-size: 13px;
            color: var(--danger);
            min-height: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .login-error:empty { display: none; }
        .login-error i { font-size: 12px; }

        .login-footer {
            font-size: 11px;
            color: rgba(136,136,160,.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .login-footer i { font-size: 10px; }

        .login-card { animation: cardIn .4s ease; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="login-bg">
        <div class="grid"></div>
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-brand">
            <div class="login-logo"><i class="fas fa-terminal"></i></div>
            <h1>SSH File Manager</h1>
            <p>安全远程文件管理工作台</p>
        </div>

        <div class="login-card">
            <form id="login-form" onsubmit="doLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> 用户名</label>
                    <div class="input-wrapper">
                        <input type="text" id="login-user" required placeholder="输入管理员账号" autocomplete="username" autofocus>
                        <i class="fas fa-at input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> 密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="login-pwd" required placeholder="输入密码" autocomplete="current-password">
                        <i class="fas fa-key input-icon"></i>
                        <button type="button" class="toggle-pwd" onclick="togglePwd()" title="显示/隐藏密码"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="login-btn">
                    <span class="btn-text"><i class="fas fa-arrow-right-to-bracket"></i> 登 录</span>
                    <div class="spinner"></div>
                </button>
                <div class="login-error" id="login-error"></div>
            </form>
        </div>

        <div class="login-footer">
            <i class="fas fa-shield-halved"></i> 连接已加密 &middot; 仅限授权访问
        </div>
    </div>

    <script>
    function togglePwd() {
        const inp = document.getElementById("login-pwd");
        const icon = document.querySelector(".toggle-pwd i");
        if (inp.type === "password") {
            inp.type = "text";
            icon.className = "fas fa-eye-slash";
        } else {
            inp.type = "password";
            icon.className = "fas fa-eye";
        }
    }

    async function doLogin(e) {
        e.preventDefault();
        const errEl = document.getElementById("login-error");
        const btn = document.getElementById("login-btn");
        errEl.innerHTML = "";
        btn.classList.add("loading");
        btn.disabled = true;
        try {
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: document.getElementById("login-user").value,
                    password: document.getElementById("login-pwd").value,
                }),
            });
            if (res.ok) {
                window.location.replace("/");
                window.location.reload();
                return;
            } else {
                const data = await res.json();
                errEl.innerHTML = '<i class="fas fa-circle-exclamation"></i> ' + (data.detail || "登录失败");
                btn.classList.remove("loading");
                btn.disabled = false;
            }
        } catch (err) {
            errEl.innerHTML = '<i class="fas fa-circle-exclamation"></i> 网络连接失败';
            btn.classList.remove("loading");
            btn.disabled = false;
        }
    }

    </script>
</body>
</html>
